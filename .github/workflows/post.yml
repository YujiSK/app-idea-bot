name: Auto Post App Ideas

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting to external APIs"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # JST 09:00. GitHub Actions schedules are UTC and may run with some delay.
    - cron: "0 0 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Post app idea
        run: python post.py
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          POST_TARGETS: ${{ vars.POST_TARGETS || 'bluesky,mastodon' }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY || 'public' }}
